# FundPilot 配置模板（V0.1）
#
# 使用方式：复制为 config.yaml 后按需修改。
# 环境变量覆盖：以 FUNDPILOT_ 前缀，按段_键的方式，如
#   FUNDPILOT_SERVER_PORT=9090
#   FUNDPILOT_DATABASE_DSN=postgres://...
#
# 字段集对齐 REQ-01 FR-PL-02。

server:
  port: 8080
  read_timeout: 10s
  write_timeout: 30s

database:
  # 与 docker-compose.yml 默认一致；生产可改 / 走环境变量
  dsn: "postgres://fundpilot:fundpilot@localhost:5432/fundpilot?sslmode=disable"
  max_open: 20
  max_idle: 5

valuation:
  refresh_interval: 5m       # 估值刷新间隔
  trading_hours_only: true   # 仅交易时段刷新

market_data:
  primary_source: eastmoney  # 主源
  fallback_sources: [akshare]
  request_timeout: 5s
  max_retries: 2

logger:
  level: info                # debug / info / warn / error
  format: json               # json / console
