# FundPilot 配置模板（V0.1）
#
# 使用方式：cp config.example.yaml config.yaml，然后按需修改。
# ⚠️  config.yaml 包含真实密码/密钥，已被 .gitignore 排除，切勿提交到版本库。
# ⚠️  如需通过环境变量覆盖敏感字段，使用 FUNDPILOT_ 前缀：
#       FUNDPILOT_DATABASE_DSN=postgres://user:pass@host:5432/db
#       FUNDPILOT_SERVER_PORT=9090
#
# 字段集对齐 REQ-01 FR-PL-02。

server:
  port: 8080
  read_timeout: 10s
  write_timeout: 30s

database:
  # ⚠️  下方 DSN 中的用户名和密码仅为本地开发示例，正式环境请替换或使用环境变量
  dsn: "postgres://fundpilot:CHANGE_ME@localhost:5432/fundpilot?sslmode=disable"
  max_open: 20
  max_idle: 5

valuation:
  refresh_interval: 5m       # 估值刷新间隔
  trading_hours_only: true   # 仅交易时段刷新

market_data:
  primary_source: eastmoney  # 主源
  fallback_sources: [akshare]
  request_timeout: 5s
  max_retries: 2

logger:
  level: info                # debug / info / warn / error
  format: json               # json / console
